<div class="container mt-4">

    <div class="row g-3">

        <div>
            <button class="btn btn-primary">Crear gasto compartido</button>
        </div>

        <div>
            <ng-container *ngIf="groups$ | async as groups; else loading">
                <div class="row">
                    <div class="col-md-4 mb-3" *ngFor="let group of groups">
                        <app-group-card [group]="group"></app-group-card>
                    </div>
                </div>
            </ng-container>

            <ng-template #loading>
                <p>Cargando grupos...</p>
            </ng-template>

        </div>

    </div>




</div>
